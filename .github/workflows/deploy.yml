name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site deps
        working-directory: site
        run: npm ci

      - name: Get Playwright version
        id: pw
        working-directory: site
        run: echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium (cache miss → full install)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: site
        run: npx playwright install-deps chromium

      - name: Sync PDFs into site/public/pdf/
        run: node scripts/sync-pdfs.mjs

      - name: Migrate lecture frontmatter (idempotent)
        run: node scripts/migrate-frontmatter.mjs

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
